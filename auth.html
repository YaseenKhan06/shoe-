<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StepStyle | Secure Authenticate</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Inter:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#ffb95f",
                        "surface-bright": "#41382e",
                        "on-surface-variant": "#d8c3ad",
                        "surface-container-highest": "#3c3329",
                        "surface-container-lowest": "#140d06",
                        "on-primary-container": "#613b00",
                        "primary-container": "#f59e0b",
                        "primary": "#ffc174",
                        "surface": "#19120a",
                        "on-surface": "#f0e0d1",
                        "background": "#0A0A0A",
                        "on-background": "#f0e0d1",
                        "secondary": "#b7c8e1",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "section-gap": "120px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "label-caps": ["Montserrat"],
                        "headline-lg": ["Montserrat"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Montserrat"],
                        "body-md": ["Inter"],
                        "display-hero": ["Montserrat"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0A0A0A;
            color: #f0e0d1;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease-in-out;
        }

        .glass-card:hover {
            border-color: rgba(255, 193, 116, 0.3);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(255, 193, 116, 0.4);
        }

        .input-glow:focus {
            outline: none;
            border-color: #ffc174;
            box-shadow: 0 0 10px rgba(255, 193, 116, 0.15);
        }
    </style>
    <script src="search.js" defer></script>
</head>

<body class="bg-background text-on-background selection:bg-primary selection:text-on-primary min-h-screen flex flex-col">

    <!-- Top Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 md:px-margin-desktop py-4 max-w-full mx-auto">
        <div class="font-display-hero text-headline-md text-primary tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">StepStyle</div>
        <div class="hidden md:flex gap-8 items-center">
            <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all duration-300 hover:scale-105" href="index.html">Home</a>
            <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all duration-300 hover:scale-105" href="index.html#categories">Categories</a>
            <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all duration-300 hover:scale-105" href="aboutus.html">About Us</a>
            <a class="font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-all duration-300 hover:scale-105" href="code.html">Contact Us</a>
        </div>
        <div class="flex items-center gap-6 text-on-surface-variant">
            <button class="material-symbols-outlined hover:text-primary transition-colors cursor-pointer">search</button>
            <div class="relative cursor-pointer hover:text-primary transition-colors">
                <span class="material-symbols-outlined">favorite</span>
                <span class="absolute -top-2 -right-2 bg-primary text-black text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
            </div>
            <div class="relative cursor-pointer hover:text-primary transition-colors">
                <span class="material-symbols-outlined">shopping_cart</span>
                <span class="absolute -top-2 -right-2 bg-primary text-black text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="flex-grow flex items-center justify-center pt-32 pb-16 px-6">
        <div class="w-full max-w-md">
            
            <!-- Auth Container (Centered Glassmorphic Card) -->
            <div class="glass-card p-8 md:p-10 rounded-2xl relative overflow-hidden transition-all duration-500">
                <div class="absolute -top-16 -right-16 w-32 h-32 bg-primary/10 rounded-full blur-2xl"></div>
                
                <!-- Toggle Headers -->
                <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                    <button id="toggle-login-tab" class="font-headline-md text-lg uppercase tracking-tight text-primary font-bold border-b-2 border-primary pb-2 -mb-[18px] transition-all focus:outline-none" onclick="showLogin()">Login</button>
                    <button id="toggle-signup-tab" class="font-headline-md text-lg uppercase tracking-tight text-on-surface-variant hover:text-primary pb-2 -mb-[18px] transition-all focus:outline-none" onclick="showSignUp()">Sign Up</button>
                </div>

                <!-- LOGIN FORM -->
                <form id="login-form" onsubmit="handleUserLogin(event)" class="space-y-6">
                    <div class="space-y-2">
                        <label class="block font-label-caps text-[11px] text-on-surface-variant uppercase tracking-wider">Email Address</label>
                        <input type="email" id="login-email" required class="w-full bg-white/5 border border-white/10 rounded px-4 py-3 text-on-surface input-glow transition-all" placeholder="name@email.com" />
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label-caps text-[11px] text-on-surface-variant uppercase tracking-wider">Password</label>
                        <input type="password" id="login-password" required class="w-full bg-white/5 border border-white/10 rounded px-4 py-3 text-on-surface input-glow transition-all" placeholder="••••••••" />
                        <div class="flex justify-end pt-1">
                            <a href="forgot-password.html" class="text-primary hover:text-primary-fixed-dim transition-colors font-label-caps text-[10px] uppercase tracking-wider">Forgot Password?</a>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-primary text-black font-label-caps text-label-caps py-4 hover:scale-[1.02] transition-transform duration-300 font-bold uppercase tracking-widest mt-4">
                        Sign In
                    </button>
                </form>

                <!-- SIGN UP FORM (Initially Hidden) -->
                <form id="signup-form" onsubmit="handleUserSignUp(event)" class="space-y-6 hidden">
                    <div class="space-y-2">
                        <label class="block font-label-caps text-[11px] text-on-surface-variant uppercase tracking-wider">Full Name</label>
                        <input type="text" id="signup-name" required class="w-full bg-white/5 border border-white/10 rounded px-4 py-3 text-on-surface input-glow transition-all" placeholder="Alex Mercer" />
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label-caps text-[11px] text-on-surface-variant uppercase tracking-wider">Email Address</label>
                        <input type="email" id="signup-email" required class="w-full bg-white/5 border border-white/10 rounded px-4 py-3 text-on-surface input-glow transition-all" placeholder="name@email.com" />
                    </div>
                    <div class="space-y-2">
                        <label class="block font-label-caps text-[11px] text-on-surface-variant uppercase tracking-wider">Password</label>
                        <input type="password" id="signup-password" required class="w-full bg-white/5 border border-white/10 rounded px-4 py-3 text-on-surface input-glow transition-all" placeholder="••••••••" />
                    </div>
                    
                    <button type="submit" class="w-full bg-primary text-black font-label-caps text-label-caps py-4 hover:scale-[1.02] transition-transform duration-300 font-bold uppercase tracking-widest mt-4">
                        Register Account
                    </button>
                </form>

            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-surface-container-lowest text-on-surface-variant w-full relative border-t border-white/5 py-8 text-center text-sm mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center px-6 md:px-margin-desktop gap-4">
            <span class="opacity-50 font-body-md text-xs">© 2024 StepStyle Luxury. Secure Customer Portal.</span>
            <div class="flex gap-6">
                <a class="font-label-caps text-[10px] hover:text-primary transition-colors" href="index.html">Main Site</a>
                <a class="font-label-caps text-[10px] hover:text-primary transition-colors" href="aboutus.html">About Us</a>
            </div>
        </div>
    </footer>

    <!-- Client-side Logic -->
    <script>
        const API_BASE = '/api';

        function showLogin() {
            // Toggle form views
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            
            // Toggle headers styles
            document.getElementById('toggle-login-tab').className = "font-headline-md text-lg uppercase tracking-tight text-primary font-bold border-b-2 border-primary pb-2 -mb-[18px] transition-all focus:outline-none";
            document.getElementById('toggle-signup-tab').className = "font-headline-md text-lg uppercase tracking-tight text-on-surface-variant hover:text-primary pb-2 -mb-[18px] transition-all focus:outline-none";
        }

        function showSignUp() {
            // Toggle form views
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('signup-form').classList.remove('hidden');
            
            // Toggle headers styles
            document.getElementById('toggle-login-tab').className = "font-headline-md text-lg uppercase tracking-tight text-on-surface-variant hover:text-primary pb-2 -mb-[18px] transition-all focus:outline-none";
            document.getElementById('toggle-signup-tab').className = "font-headline-md text-lg uppercase tracking-tight text-primary font-bold border-b-2 border-primary pb-2 -mb-[18px] transition-all focus:outline-none";
        }

        async function handleUserLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'AUTHENTICATING...';

                const res = await fetch(`${API_BASE}/user-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('userToken', data.token);
                    alert("Welcome to StepStyle!");
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || "Login failed. Please verify credentials.");
                }
            } catch (err) {
                console.error("Login Error:", err);
                alert("Network error. Failed to reach the server.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        }

        async function handleUserSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerText;

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'CREATING ACCOUNT...';

                const res = await fetch(`${API_BASE}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('userToken', data.token);
                    alert("Welcome to StepStyle!");
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || "Registration failed. Please check inputs.");
                }
            } catch (err) {
                console.error("SignUp Error:", err);
                alert("Network error. Failed to reach the server.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        }
    </script>

</body>

</html>
